<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Todo</title>
	<link rel="stylesheet" href="./styles/main.css">
	<script src="js/index.js" type="module" defer></script>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>
	<div class="main_container">

		<div class="sideBar_container">

			<div id="sideBar_search"><button>Search</button></div>
			
			<div id="sideBar_createNew">
				<button>Create New</button>
				<div class="create_dropdown">
					<div id="create_title">Title<input></div>
					<div id="create_description">Desc<input></div>
					<div id="create_dueDate">Due By<input></div>
					<div><button id="createButton">Create</button></div>
				</div>
			</div>

			<div id="sideBar_starred">
				<button>Starred</button>
				<div class="starred_dropdown"></div>
			</div>
		
		</div>

		<div class="todo_container">
			<div class="today_container">
				<div class="title">
					Today
				</div>
			</div>
			<div class="week_container">
				<div class="title">
					This Week
				</div>
			</div>
			<div class="upcoming_container">
				<div class="title">
					Upcoming
				</div>
			</div>
		</div>

	</div>
</body>
</html>
