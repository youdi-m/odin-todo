<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Todo</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>
	<div class="main_container">

		<div class="sideBar_container">

			<div class="sidebar_todo_container">
				<div id="sideBar_addTask"><button>Add Task</button></div>
				<div id="sideBar_search"><button>Search</button></div>
				<div id="sideBar_today"><button>Today</button></div>
				<div id="sideBar_week"><button>This Week</button></div>
				<div id="sideBar_upcoming"><button>Upcoming</button></div>
				<div id="sideBar_starred"><button>Starred</button></div>
			</div>

			<div class="sidebar_projects_container">
				<div><button>Projects</button></div>
			</div>

		</div>

		<div class="todo_container">
			<div id="create_container"></div>
			<div id="today_container"></div>
			<div id="week_container"></div>
			<div id="upcoming_container"></div>
			<div id="starred_container"></div>
			<div id="projects_container"></div>
		</div>
	</div>
</body>
</html>
